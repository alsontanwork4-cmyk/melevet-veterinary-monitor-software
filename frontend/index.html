<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; base-uri 'self'; form-action 'self'; frame-ancestors 'none'; object-src 'none'; img-src 'self' data: blob:; script-src 'self'; style-src 'self' 'unsafe-inline'; font-src 'self'; connect-src 'self' https: http://localhost:* http://127.0.0.1:* ws://localhost:* ws://127.0.0.1:*"
    />
    <meta name="referrer" content="strict-origin-when-cross-origin" />
    <title>Melevet Monitor Platform</title>
  </head>
  <body>
    <div id="root">
      <main
        style="
          min-height: 100vh;
          display: grid;
          place-items: center;
          padding: 24px;
          margin: 0;
          background: linear-gradient(180deg, #F5F8FA 0%, #EEF3F6 100%);
          color: #1A2332;
          font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        "
      >
        <section
          style="
            width: min(100%, 420px);
            padding: 32px;
            border: 1px solid #E2E8F0;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
          "
        >
          <p style="margin: 0 0 8px; font-size: 12px; font-weight: 700; letter-spacing: 0.08em; text-transform: uppercase; color: #2B6E63;">
            Loading
          </p>
          <h1 style="margin: 0 0 12px; font-family: Georgia, 'Times New Roman', serif; font-size: 28px;">
            Starting Melevet
          </h1>
          <p style="margin: 0; line-height: 1.5;">
            If this message stays on screen, refresh the page or check the browser console for frontend errors.
          </p>
        </section>
      </main>
    </div>
    <noscript>
      <main
        style="
          min-height: 100vh;
          display: grid;
          place-items: center;
          padding: 24px;
          margin: 0;
          background: linear-gradient(180deg, #F5F8FA 0%, #EEF3F6 100%);
          color: #1A2332;
          font-family: 'Segoe UI', 'Helvetica Neue', Arial, sans-serif;
        "
      >
        <section
          style="
            width: min(100%, 420px);
            padding: 32px;
            border: 1px solid #E2E8F0;
            border-radius: 14px;
            background: rgba(255, 255, 255, 0.96);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.08);
          "
        >
          JavaScript is required to run this app.
        </section>
      </main>
    </noscript>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
